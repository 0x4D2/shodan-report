# Beispiel Kundenkonfiguration für shodan-report
#
# Pflichtfelder: customer.name, customer.ip ODER customer.domain
# Alle anderen Felder sind optional.

customer:
  name: "Beispiel GmbH"
  ip: "1.2.3.4"                    # Primäre IP-Adresse
  domain: ""                        # Domain für Attack-Surface-Discovery (optional)
  contract_start: "2026-01-01"      # Vertragsbeginn (YYYY-MM-DD)
  package: "professional"           # basic | professional | enterprise

# Pakete und enthaltene Report-Abschnitte:
#   basic:        Management-Zusammenfassung, Handlungsempfehlungen, Technischer Anhang
#   professional: + Attack Surface (wenn domain gesetzt), CVE-Übersicht, Trendanalyse
#   enterprise:   + NVD Live-Lookups (automatisch aktiviert)

styling:
  primary_color: "#1a365d"
  secondary_color: "#2d3748"
  logo_path: "assets/logo.png"      # relativ zum Repo-Root

report:
  profile: "full"                 # full | executive
  include_trend_analysis: true      # true/false (wird durch package übersteuert)
  debug_mdata: false                # false in Produktion (kein .mdata.json Sidecar)

nvd:
  enabled: false                    # true = NVD-Lookups aktiv; bei package=enterprise automatisch true

hibp:
  # Stichprobenbasierte Prüfung gegen öffentlich bekannte Datenlecks (HaveIBeenPwned).
  # Standard-Adressen (info@, admin@, support@ ...) werden automatisch aus customer.domain abgeleitet.
  # extra_emails: zusätzliche Adressen, die immer geprüft werden (z.B. Geschäftsführung, IT-Leitung).
  # Ohne HIBP_API_KEY: Report zeigt manuelle Check-Links.
  # Mit HIBP_API_KEY: automatische Prüfung + Breach-Namen im Report.
  extra_emails: []
  # extra_emails:
  #   - "ceo@beispiel.de"
  #   - "it@beispiel.de"

archive:
  enabled: true
  archive_dir: "archive"
  versioning: true

logging:
  level: "INFO"                     # DEBUG / INFO / WARNING / ERROR

# Hinweise:
# - NVD_LIVE=1 (Env) überschreibt nvd.enabled.
# - customer.ip und customer.domain können beide gesetzt sein;
#   domain aktiviert Attack-Surface-Discovery.
# - report.debug_mdata: false für Produktionsläufe empfohlen.
